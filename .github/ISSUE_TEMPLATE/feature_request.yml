name: Feature request
description: Suggest an improvement to the CLI, docs, or provider layer
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the feature idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is hard, confusing, or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature
    validations:
      required: true

  - type: dropdown
    id: provider-impact
    attributes:
      label: Provider impact
      options:
        - Anthropic-compatible only
        - OpenAI-compatible only
        - Gemini only
        - Bedrock / Vertex / Foundry
        - Multi-provider
        - No provider impact
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
