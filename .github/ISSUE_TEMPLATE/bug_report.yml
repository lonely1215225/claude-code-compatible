name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please include as much reproducible detail as possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug
      placeholder: The provider wizard reports Anthropic-compatible, but runtime still uses Bedrock
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Active provider or backend
      options:
        - Anthropic-compatible
        - OpenAI-compatible
        - Gemini
        - AWS Bedrock
        - Google Vertex AI
        - Azure AI Foundry
        - Not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, and terminal if relevant
      placeholder: macOS 15, Bun 1.3.11, iTerm2
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands, settings changes, or provider env vars when possible
      placeholder: |
        1. Run /provider
        2. Select OpenAI-compatible
        3. Save and restart
        4. Observe runtime still reports Bedrock
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or terminal output
      description: Redact secrets before pasting
